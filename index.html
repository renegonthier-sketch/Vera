<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vera</title>
<meta http-equiv="cache-control" content="no-cache">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: transparent;
  font-family: 'Cormorant Garamond', Georgia, serif;
  transition: background 0.8s;
}
.shell {
  border-radius: 20px;
  overflow: hidden;
  max-width: 420px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  height: 560px;
  transition: background 0.8s;
}
.shell.day { background: #0D1B35; }
.shell.night { background: #080F1E; }
.header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 20px;
  flex-shrink: 0;
  transition: border-color 0.8s;
}
.shell.day .header { border-bottom: 0.5px solid rgba(255,255,255,0.09); }
.shell.night .header { border-bottom: 0.5px solid rgba(255,255,255,0.04); }
.avatar-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
}
.avatar {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center top;
  border: 1.5px solid rgba(201,169,110,0.5);
  display: block;
}
.shell.night .avatar { border-color: rgba(201,169,110,0.25); filter: brightness(0.85); }
.online-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 1px;
  animation: blink 1.4s infinite;
}
.shell.day .online-dot { background: #4CAF80; }
.shell.night .online-dot { background: #2A6B4A; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.name {
  font-size: 20px;
  color: #FFFFFF;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.shell.night .name { color: rgba(255,255,255,0.75); }
.role {
  font-size: 12px;
  color: #D4B87A;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 400;
  letter-spacing: 0.1em;
  font-style: italic;
}
.shell.night .role { color: rgba(201,169,110,0.5); }
.night-badge {
  display: none;
  margin-left: auto;
  font-size: 10px;
  color: rgba(201,169,110,0.4);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  letter-spacing: 0.08em;
}
.shell.night .night-badge { display: block; }
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 20px 8px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.row-v { display: flex; align-items: flex-start; gap: 10px; }
.mini {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center top;
  flex-shrink: 0;
  border: 1px solid rgba(201,169,110,0.3);
}
.shell.night .mini { filter: brightness(0.7); border-color: rgba(201,169,110,0.15); }
.bv {
  border-radius: 4px 14px 14px 14px;
  padding: 12px 16px;
  font-size: 15px;
  line-height: 1.8;
  max-width: 290px;
  border-left: 2px solid #C9A96E;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 300;
  font-style: italic;
}
.shell.day .bv { background: #1C3058; color: #E8EDF5; }
.shell.night .bv { background: #0D1A2E; color: #B8C8DC; border-left-color: rgba(201,169,110,0.4); }
.row-u { display: flex; justify-content: flex-end; }
.bu {
  background: rgba(255,255,255,0.07);
  border: 0.5px solid rgba(255,255,255,0.15);
  border-radius: 14px 4px 14px 14px;
  padding: 11px 15px;
  font-size: 15px;
  color: #E8EDF5;
  line-height: 1.7;
  max-width: 270px;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 400;
}
.shell.night .bu { color: rgba(232,237,245,0.7); border-color: rgba(255,255,255,0.08); }
.typing {
  border-radius: 4px 14px 14px 14px;
  padding: 14px 18px;
  display: flex;
  gap: 5px;
  border-left: 2px solid #C9A96E;
}
.shell.day .typing { background: #1C3058; }
.shell.night .typing { background: #0D1A2E; border-left-color: rgba(201,169,110,0.4); }
.td {
  width: 6px;
  height: 6px;
  background: #C9A96E;
  border-radius: 50%;
  animation: td 1.4s infinite;
}
.shell.night .td { background: rgba(201,169,110,0.5); }
.td:nth-child(2){animation-delay:.2s}
.td:nth-child(3){animation-delay:.4s}
@keyframes td { 0%,80%,100%{opacity:.25;transform:scale(.85)} 40%{opacity:1;transform:scale(1)} }
.input-area {
  padding: 12px 16px 16px;
  flex-shrink: 0;
}
.shell.day .input-area { border-top: 0.5px solid rgba(255,255,255,0.09); }
.shell.night .input-area { border-top: 0.5px solid rgba(255,255,255,0.04); }
.input-row {
  display: flex;
  align-items: center;
  gap: 10px;
  border-radius: 28px;
  padding: 12px 12px 12px 20px;
}
.shell.day .input-row { background: #2E5090; border: 1.5px solid #C9A96E; }
.shell.night .input-row { background: #0D1A2E; border: 1.5px solid rgba(201,169,110,0.35); }
.shell.day .input-row:focus-within { border-color: #E8C97A; background: #355AAA; }
.shell.night .input-row:focus-within { border-color: rgba(201,169,110,0.6); background: #111F35; }
input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-size: 16px;
  color: #FFFFFF;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 400;
}
.shell.night input { color: rgba(255,255,255,0.75); }
input::placeholder { color: #9BBCE0; font-style: italic; }
.shell.night input::placeholder { color: rgba(155,188,224,0.5); }
button {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.3s;
}
.shell.day button { background: #C9A96E; }
.shell.night button { background: rgba(201,169,110,0.4); }
.shell.day button:hover { background: #D4B87A; }
.shell.night button:hover { background: rgba(201,169,110,0.6); }
.footer {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px;
}
.fg {
  color: rgba(201,169,110,0.4);
  font-size: 11px;
  font-family: 'Cormorant Garamond', Georgia, serif;
  letter-spacing: 0.08em;
  font-style: italic;
}
.ft {
  font-size: 10px;
  color: #2E4560;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
}
.shell.night .ft { color: #1A2A3A; }
</style>
</head>
<body>
<div class="shell" id="shell">
  <div class="header">
    <div class="avatar-wrap">
      <img class="avatar" src="vera-portrait.jpg" alt="Vera" onerror="this.style.background='#1C3058'"/>
      <div class="online-dot"></div>
    </div>
    <div>
      <div class="name">Vera</div>
      <div class="role">Trust Architect</div>
    </div>
    <div class="night-badge">22 — 06</div>
  </div>
  <div class="messages" id="msgs">
    <div class="row-v">
      <img class="mini" src="vera-portrait.jpg" alt="Vera" onerror="this.style.visibility='hidden'"/>
      <div class="bv" id="first-msg"></div>
    </div>
    <div id="disclaimer" style="
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      padding: 8px 16px 4px;
      line-height: 1.7;
    ">
      Gespräche werden nach 90 Tagen gelöscht.<br>Keine Weitergabe an Dritte.
      <br><br>
      <span onclick="document.getElementById('disclaimer').remove()" style="
        display: inline-block;
        font-size: 10px;
        color: rgba(201,169,110,0.5);
        border: 0.5px solid rgba(201,169,110,0.3);
        border-radius: 20px;
        padding: 3px 14px;
        cursor: pointer;
        font-style: normal;
        letter-spacing: 0.08em;
      ">OK</span>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <input id="inp" type="text" maxlength="400"/>
      <button id="btn" aria-label="Senden">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7h10M7 2l5 5-5 5" stroke="#0D1B35" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="footer"><span class="fg">vēra</span><span class="ft">· Gonthier Consulting</span></div>
</div>
<script>
const msgs = document.getElementById('msgs');
const inp = document.getElementById('inp');
const btn = document.getElementById('btn');
const shell = document.getElementById('shell');
const history = [];

const lang = navigator.language.startsWith('fr') ? 'fr'
           : navigator.language.startsWith('en') ? 'en'
           : 'de';

const hour = new Date().getHours();
const isNight = hour >= 22 || hour < 6;
shell.classList.add(isNight ? 'night' : 'day');

const firstMsgDay = {
  de: 'Sie sind auf dieser Seite gelandet. Das passiert nicht zufällig.<br><br>Was beschäftigt Sie gerade wirklich?',
  en: 'You have landed on this page. That does not happen by chance.<br><br>What is really on your mind right now?',
  fr: 'Vous avez atterri sur cette page. Ce n\'est pas un hasard.<br><br>Qu\'est-ce qui vous préoccupe vraiment en ce moment?'
};

const firstMsgNight = {
  de: 'Es ist spät. Das hat einen Grund.<br><br>Was lässt Sie gerade nicht schlafen?',
  en: 'It is late. That means something.<br><br>What is keeping you awake right now?',
  fr: 'Il est tard. Ce n\'est pas un hasard.<br><br>Qu\'est-ce qui vous empêche de dormir?'
};

const placeholder = {
  de: 'Schreiben Sie — auch wenn es unfertig ist.',
  en: 'Write — even if it is not yet clear.',
  fr: 'Écrivez — même si ce n\'est pas encore clair.'
};

const firstMsg = isNight ? firstMsgNight : firstMsgDay;
document.getElementById('first-msg').innerHTML = firstMsg[lang] || firstMsg.de;
inp.placeholder = placeholder[lang] || placeholder.de;

function addV(text) {
  const r = document.createElement('div'); r.className = 'row-v';
  r.innerHTML = `<img class="mini" src="vera-portrait.jpg" alt="Vera" onerror="this.style.visibility='hidden'"/><div class="bv">${text.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(r); msgs.scrollTop = msgs.scrollHeight;
}
function addU(text) {
  const r = document.createElement('div'); r.className = 'row-u';
  r.innerHTML = `<div class="bu">${text}</div>`;
  msgs.appendChild(r); msgs.scrollTop = msgs.scrollHeight;
}
function showTyping() {
  const r = document.createElement('div'); r.className = 'row-v'; r.id = 'typing';
  r.innerHTML = `<img class="mini" src="vera-portrait.jpg" alt="Vera" onerror="this.style.visibility='hidden'"/><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  msgs.appendChild(r); msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

async function send() {
  const text = inp.value.trim(); if (!text) return;
  inp.value = ''; inp.disabled = true; btn.disabled = true;
  addU(text);
  document.getElementById('disclaimer')?.remove();
  history.push({ role: 'user', content: text });
  showTyping();
  try {
    const res = await fetch('/api/vera', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, lang, isNight })
    });
    const data = await res.json();
    const reply = data.reply || 'Ein Moment bitte.';
    history.push({ role: 'assistant', content: reply });
    removeTyping(); addV(reply);
  } catch {
    removeTyping();
    addV(lang === 'fr'
      ? 'Un moment technique — veuillez réessayer.'
      : lang === 'en'
      ? 'A technical moment — please try again shortly.'
      : 'Ein technischer Moment — bitte versuchen Sie es gleich nochmal.');
  }
  inp.disabled = false; btn.disabled = false; inp.focus();
}
btn.addEventListener('click', send);
inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
</script>
</body>
</html>
