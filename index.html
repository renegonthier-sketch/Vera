<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERA</title>
<meta http-equiv="cache-control" content="no-cache">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: transparent;
  font-family: 'Avenir Next', 'Avenir', 'Nunito', 'Segoe UI', Arial, sans-serif;
}
.shell {
  background: #0D1B35;
  border-radius: 20px;
  overflow: hidden;
  max-width: 420px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  height: 560px;
}
.header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  border-bottom: 0.5px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}
.avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center top;
  border: 1.5px solid rgba(201,169,110,0.5);
}
.dot {
  width: 10px;
  height: 10px;
  background: #4CAF80;
  border-radius: 50%;
  border: 2px solid #0D1B35;
  margin-left: -14px;
  margin-top: 32px;
  animation: pulse 2.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.name {
  font-size: 16px;
  color: #E8EDF5;
  font-family: 'Avenir Next', 'Avenir', 'Nunito', 'Segoe UI', Arial, sans-serif;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.role {
  font-size: 11px;
  color: #C9A96E;
  font-family: 'Avenir Next', 'Avenir', 'Nunito', 'Segoe UI', Arial, sans-serif;
  font-weight: 400;
  letter-spacing: 0.08em;
}
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 20px 8px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.row-v { display: flex; align-items: flex-start; gap: 10px; }
.mini {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center top;
  flex-shrink: 0;
  border: 1px solid rgba(201,169,110,0.3);
}
.bv {
  background: #1C3058;
  border-radius: 4px 14px 14px 14px;
  padding: 12px 16px;
  font-size: 14px;
  color: #C8D4E8;
  line-height: 1.75;
  max-width: 290px;
  border-left: 2px solid #C9A96E;
  font-family: 'Avenir Next', 'Avenir', 'Nunito', 'Segoe UI', Arial, sans-serif;
  font-weight: 300;
}
.row-u { display: flex; justify-content: flex-end; }
.bu {
  background: rgba(255,255,255,0.05);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 14px 4px 14px 14px;
  padding: 11px 15px;
  font-size: 14px;
  color: #A8B8CC;
  line-height: 1.65;
  max-width: 270px;
  font-family: 'Avenir Next', 'Avenir', 'Nunito', 'Segoe UI', Arial, sans-serif;
  font-weight: 400;
}
.typing {
  background: #1C3058;
  border-radius: 4px 14px 14px 14px;
  padding: 14px 18px;
  display: flex;
  gap: 5px;
  border-left: 2px solid #C9A96E;
}
.td {
  width: 6px;
  height: 6px;
  background: #C9A96E;
  border-radius: 50%;
  animation: td 1.4s infinite;
}
.td:nth-child(2){animation-delay:.2s}
.td:nth-child(3){animation-delay:.4s}
@keyframes td { 0%,80%,100%{opacity:.25;transform:scale(.85)} 40%{opacity:1;transform:scale(1)} }
.input-area {
  padding: 10px 16px 14px;
  border-top: 0.5px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.input-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #162845;
  border-radius: 28px;
  padding: 10px 10px 10px 18px;
  border: 0.5px solid rgba(255,255,255,0.08);
}
input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-size: 14px;
  color: #C8D4E8;
  font-family: 'Avenir Next', 'Avenir', 'Nunito', 'Segoe UI', Arial, sans-serif;
  font-weight: 400;
}
input::placeholder { color: #3A5070; }
button {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: #C9A96E;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
button:hover { background: #D4B87A; }
.footer {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px;
}
.fg {
  color: rgba(201,169,110,0.4);
  font-size: 10px;
  font-family: 'Avenir Next', 'Avenir', 'Nunito', 'Segoe UI', Arial, sans-serif;
  letter-spacing: 0.05em;
}
.ft {
  font-size: 10px;
  color: #2E4560;
  font-family: 'Avenir Next', 'Avenir', 'Nunito', 'Segoe UI', Arial, sans-serif;
}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div style="position:relative;flex-shrink:0">
      <img class="avatar" src="vera-portrait.jpg" alt="VERA" onerror="this.style.background='#1C3058'"/>
      <div class="dot"></div>
    </div>
    <div>
      <div class="name">VERA</div>
      <div class="role">Trust Architect</div>
    </div>
  </div>
  <div class="messages" id="msgs">
    <div class="row-v">
      <img class="mini" src="vera-portrait.jpg" alt="VERA" onerror="this.style.visibility='hidden'"/>
      <div class="bv" id="first-msg">Guten Tag. Ich bin VERA.<br><br>Bevor ich Ihnen irgendetwas erkläre: Was beschäftigt Sie gerade wirklich?</div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <input id="inp" type="text" placeholder="Ihre Antwort..." maxlength="400"/>
      <button id="btn" aria-label="Senden">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7h10M7 2l5 5-5 5" stroke="#0D1B35" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="footer"><span class="fg">vēra</span><span class="ft">· shape the future together</span></div>
</div>
<script>
const msgs = document.getElementById('msgs');
const inp = document.getElementById('inp');
const btn = document.getElementById('btn');
const history = [];
const lang = navigator.language.startsWith('fr') ? 'fr'
           : navigator.language.startsWith('en') ? 'en'
           : 'de';

const firstMsg = {
  de: 'Guten Tag. Ich bin VERA.<br><br>Bevor ich Ihnen irgendetwas erkläre: Was beschäftigt Sie gerade wirklich?',
  en: 'Good day. I am VERA.<br><br>Before I explain anything: What is really on your mind right now?',
  fr: 'Bonjour. Je suis VERA.<br><br>Avant de vous expliquer quoi que ce soit: Qu\'est-ce qui vous préoccupe vraiment en ce moment?'
};
const placeholder = { de: 'Ihre Antwort...', en: 'Your answer...', fr: 'Votre réponse...' };

document.getElementById('first-msg').innerHTML = firstMsg[lang] || firstMsg.de;
inp.placeholder = placeholder[lang] || placeholder.de;

function addV(text) {
  const r = document.createElement('div'); r.className = 'row-v';
  r.innerHTML = `<img class="mini" src="vera-portrait.jpg" alt="VERA" onerror="this.style.visibility='hidden'"/><div class="bv">${text.replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(r); msgs.scrollTop = msgs.scrollHeight;
}
function addU(text) {
  const r = document.createElement('div'); r.className = 'row-u';
  r.innerHTML = `<div class="bu">${text}</div>`;
  msgs.appendChild(r); msgs.scrollTop = msgs.scrollHeight;
}
function showTyping() {
  const r = document.createElement('div'); r.className = 'row-v'; r.id = 'typing';
  r.innerHTML = `<img class="mini" src="vera-portrait.jpg" alt="VERA" onerror="this.style.visibility='hidden'"/><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  msgs.appendChild(r); msgs.scrollTop = msgs.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

async function send() {
  const text = inp.value.trim(); if (!text) return;
  inp.value = ''; inp.disabled = true; btn.disabled = true;
  addU(text); history.push({role:'user',content:text}); showTyping();
  try {
    const res = await fetch('/api/vera', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history,lang})});
    const data = await res.json();
    const reply = data.reply || 'Ein Moment bitte.';
    history.push({role:'assistant',content:reply});
    removeTyping(); addV(reply);
  } catch { removeTyping(); addV('Ein technischer Moment — bitte versuchen Sie es gleich nochmal.'); }
  inp.disabled = false; btn.disabled = false; inp.focus();
}
btn.addEventListener('click', send);
inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });
</script>
</body>
</html>
